name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: fleetos
          POSTGRES_USER: fleetos
          POSTGRES_PASSWORD: fleetos_secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fleetos"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://fleetos:fleetos_secret@localhost:5432/fleetos
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci-access-secret-min-10-chars
      JWT_REFRESH_SECRET: ci-refresh-secret-min-10-chars
      JWT_ACCESS_EXPIRES: 15m
      JWT_REFRESH_EXPIRES: 7d
      NODE_ENV: development
      API_PORT: 3001
      FRONTEND_URL: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:3001

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @fleetos/api exec prisma generate

      - name: Apply migrations
        run: pnpm db:migrate:deploy

      - name: Build packages
        run: pnpm build

      # Web uses strict ESLint rules not yet clean; Next build already typechecks web.
      - name: Lint (API)
        run: pnpm --filter @fleetos/api lint

      - name: Unit tests
        run: pnpm test

      - name: Integration tests
        run: pnpm --filter @fleetos/api test:integration
