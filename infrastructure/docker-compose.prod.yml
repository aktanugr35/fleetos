# Production stack for VPS (IONOS etc.): Postgres + Redis + API + Web
# Guide: docs/DEPLOY-VPS.md
#
#   cp infrastructure/.env.prod.example infrastructure/.env.prod
#   sh scripts/vps/deploy.sh
#
# API/Web bind to 127.0.0.1 — expose HTTPS via host Nginx (infrastructure/nginx/).
# mem_limit values target ~2 GB VPS; increase if you upgrade RAM.

services:
  db:
    image: postgres:15-alpine
    container_name: haulyard-prod-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-haulyard}
      POSTGRES_USER: ${POSTGRES_USER:-haulyard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-haulyard}']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    mem_limit: 512m

  redis:
    image: redis:7-alpine
    container_name: haulyard-prod-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    mem_limit: 128m

  api:
    build:
      context: ..
      dockerfile: infrastructure/docker/api.Dockerfile
    container_name: haulyard-prod-api
    env_file:
      - .env.prod
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-haulyard}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-haulyard}
      REDIS_URL: redis://redis:6379
      NODE_ENV: ${NODE_ENV:-production}
      API_PORT: 3001
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      CROSS_SITE_COOKIES: ${CROSS_SITE_COOKIES:-false}
    ports:
      - '127.0.0.1:${API_PORT:-3001}:3001'
    volumes:
      - api_uploads:/app/apps/api/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 768m

  web:
    build:
      context: ..
      dockerfile: infrastructure/docker/web.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
        NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
    container_name: haulyard-prod-web
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - '127.0.0.1:${WEB_PORT:-3000}:3000'
    depends_on:
      - api
    restart: unless-stopped
    mem_limit: 512m

volumes:
  postgres_data:
  redis_data:
  api_uploads:
