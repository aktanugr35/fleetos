# Render Blueprint — FleetOS API (monorepo root)
# Docs: docs/DEPLOY-VERCEL-RENDER.md
#
# After deploy: set FRONTEND_URL + CROSS_SITE_COOKIES=true + S3 + Upstash REDIS_URL in dashboard.

services:
  - type: web
    name: fleetos-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: >-
      corepack enable &&
      corepack prepare pnpm@9.15.0 --activate &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @fleetos/shared-types build &&
      pnpm --filter @fleetos/api exec prisma generate &&
      pnpm --filter @fleetos/api build
    startCommand: pnpm start:api
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CROSS_SITE_COOKIES
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: fleetos-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: auto
      - key: S3_BUCKET_NAME
        sync: false

databases:
  - name: fleetos-db
    plan: free
    databaseName: fleetos
    user: fleetos
